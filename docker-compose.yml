services:
  redis:
    image: redis:7
    container_name: rag-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: rag-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1

  worker:
    build: .
    container_name: rag-worker
    command: celery -A app.core.celeryapp worker --pool=solo --loglevel=info
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
